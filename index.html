<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Switchball Scoreboard</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    text-align:center;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
    margin-top:0;
}

.player{
    border:2px solid #ddd;
    border-radius:10px;
    padding:10px;
    margin:10px 0;
}

button{
    padding:12px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.hit{background:#4CAF50;color:white;}
.strike{background:#f44336;color:white;}
.catch{background:#ff9800;color:white;}
.foul{background:#9c27b0;color:white;}
.switch{background:#2196F3;color:white;}
.reset{background:#555;color:white;}

.score{
    font-size:24px;
    font-weight:bold;
}

.role{
    font-size:18px;
    margin:10px 0;
}

.final{
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="container">

<h1>⚾ Switchball</h1>

<div>
    <input id="player1Name" value="Player 1">
    <input id="player2Name" value="Player 2">
</div>

<div class="role" id="roles"></div>

<div class="player">
    <h2 id="p1Label">Player 1</h2>
    <div class="score" id="p1Score">0</div>
    Fouls: <span id="p1Fouls">0</span>
</div>

<div class="player">
    <h2 id="p2Label">Player 2</h2>
    <div class="score" id="p2Score">0</div>
    Fouls: <span id="p2Fouls">0</span>
</div>

<h3>Round Points: <span id="roundPoints">0</span> / 7</h3>

<button class="hit" onclick="hit()">Hit (+1 Batter)</button>
<button class="strike" onclick="strike()">Strike (+1 Pitcher)</button>
<button class="catch" onclick="catchBall()">Catch (+1 Pitcher)</button>
<button class="foul" onclick="foul()">Foul</button>

<br><br>

<button class="switch" onclick="switchRoles()">Switch Roles</button>
<button class="reset" onclick="resetGame()">Reset</button>

<div class="final" id="finalScore"></div>

</div>

<script>

let scores = [0,0];
let fouls = [0,0];

let batter = 0;
let pitcher = 1;

let roundPoints = 0;

function updateDisplay(){

    const p1 = document.getElementById("player1Name").value || "Player 1";
    const p2 = document.getElementById("player2Name").value || "Player 2";

    document.getElementById("p1Label").textContent = p1;
    document.getElementById("p2Label").textContent = p2;

    document.getElementById("p1Score").textContent = scores[0];
    document.getElementById("p2Score").textContent = scores[1];

    document.getElementById("p1Fouls").textContent = fouls[0];
    document.getElementById("p2Fouls").textContent = fouls[1];

    document.getElementById("roundPoints").textContent = roundPoints;

    const batterName = batter === 0 ? p1 : p2;
    const pitcherName = pitcher === 0 ? p1 : p2;

    document.getElementById("roles").innerHTML =
        "<strong>Batter:</strong> " + batterName +
        " | <strong>Pitcher:</strong> " + pitcherName;

    const final1 = scores[0] - fouls[0];
    const final2 = scores[1] - fouls[1];

    let winner = "Tie";

    if(final1 > final2) winner = p1;
    if(final2 > final1) winner = p2;

    document.getElementById("finalScore").innerHTML =
        `Current Final Score<br>
        ${p1}: ${final1} |
        ${p2}: ${final2}<br>
        Leader: ${winner}`;
}

function addRoundPoint(){
    roundPoints++;

    if(roundPoints >= 7){
        alert("7 points scored! Switching roles.");
        switchRoles();
    }
}

function hit(){
    scores[batter]++;
    addRoundPoint();
    updateDisplay();
}

function strike(){
    scores[pitcher]++;
    addRoundPoint();
    updateDisplay();
}

function catchBall(){
    scores[pitcher]++;
    addRoundPoint();
    updateDisplay();
}

function foul(){
    fouls[batter]++;
    updateDisplay();
}

function switchRoles(){
    [batter,pitcher] = [pitcher,batter];
    roundPoints = 0;
    updateDisplay();
}

function resetGame(){
    scores=[0,0];
    fouls=[0,0];
    batter=0;
    pitcher=1;
    roundPoints=0;
    updateDisplay();
}

updateDisplay();

</script>

</body>
</html>
